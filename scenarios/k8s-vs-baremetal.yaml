# Bare metal vs Kubernetes (Multus + SR-IOV VF + CPU Manager pinning),
# plus CPU-side isolation validation on both platforms.

matrices:
  - id_template: "{platform}-onload-net"
    base:
      description: Same Onload config, bare metal vs k8s pod with SR-IOV VF
      platform: baremetal         # overridden by axis
      network_path: onload
      onload:
        profile: latency
        env: { EF_POLL_USEC: "100000" }
      nic:
        vendor: "0x1924"          # resolved per host/pod at run time
        ports:
          - { card: x2522-a, numa_node: 0 }
      cpu:
        client_cores: [4]
        server_cores: [4]
        irq_cores: [2]
        require_isolated: true
      tools:
        - name: sfnt-pingpong
          params: { msg_sizes: [64, 256], duration_s: 10, spin: true }
        - name: sockperf
          params: { mode: under-load, msg_size: 64, mps: 100000, duration_s: 30 }
      repetitions: 5
      tags: [platform-comparison]
    axes:
      platform: [baremetal, k8s]

  - id_template: "{platform}-cpu-isolation"
    base:
      description: CPU jitter + scheduler latency on isolated cores
      platform: baremetal
      network_path: kernel
      nic:
        vendor: "0x1924"
        ports:
          - { card: x2522-a, numa_node: 0 }
      cpu:
        client_cores: [4, 6]
        server_cores: [4, 6]
        require_isolated: true
      tools:
        - name: sysjitter
          params: { runtime_s: 30, threshold_ns: 200 }
        # cyclictest is optional (rt-tests + numactl-devel are unreachable
        # from airgapped builds). Uncomment where the binary is installed:
        # - name: cyclictest
        #   params: { duration_s: 30 }
      repetitions: 3
      tags: [cpu, jitter]
    axes:
      platform: [baremetal, k8s]
