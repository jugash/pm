# Core comparison: kernel stack vs Onload kernel bypass on bare metal.
#
# Note: ports carry no interface name. The harness resolves the real name on
# each host at run time (Solarflare = PCI vendor 0x1924, NUMA-filtered), so
# the same file works when the client calls the port ens1f0 and the server
# calls it enp59s0f0. Pin an exact slot with `pci: "0000:3b:00.0"` instead,
# or a literal `name:` if you prefer. Discover facts with `perfbench nics`.

matrices:
  - id_template: "bm-{network_path}-pp"
    base:
      description: Bare metal ping-pong + under-load latency, kernel vs Onload
      platform: baremetal
      network_path: kernel        # overridden by axis
      nic:
        vendor: "0x1924"          # Solarflare; resolution + preflight key on this
        ports:
          - { card: x2522-a, numa_node: 0 }
      cpu:
        client_cores: [4]
        server_cores: [4]
        irq_cores: [2]
        numa_node: 0
        require_isolated: true
      tools:
        - name: sfnt-pingpong
          params: { protocol: tcp, msg_sizes: [32, 64, 256, 1024], duration_s: 10, spin: true }
        - name: sockperf
          params: { mode: under-load, msg_size: 64, mps: 100000, duration_s: 30 }
        - name: netperf
          params: { msg_size: 64, duration_s: 10 }
        - name: iperf3
          params: { duration_s: 10 }
      repetitions: 5
      tags: [core-comparison]
    axes:
      network_path: [kernel, onload]

  # Onload tuning sweep: spinning vs interrupt-driven.
  - id_template: "bm-onload-{onload.env.EF_INT_DRIVEN}"
    base:
      description: Onload spin vs interrupt-driven
      platform: baremetal
      network_path: onload
      onload:
        profile: latency
        env: { EF_POLL_USEC: "100000", EF_INT_DRIVEN: "0" }
      nic:
        vendor: "0x1924"
        ports:
          - { card: x2522-a, numa_node: 0 }
      cpu:
        client_cores: [4]
        server_cores: [4]
        irq_cores: [2]
        require_isolated: true
      tools:
        - name: sockperf
          params: { mode: under-load, msg_size: 64, mps: 100000, duration_s: 30 }
      repetitions: 5
      tags: [onload-tuning]
    axes:
      onload.env.EF_INT_DRIVEN: ["0", "1"]
