# Core comparison: kernel stack vs Onload kernel bypass on bare metal.
# Expands to 4 scenarios: {kernel, onload} x {interrupt-mode, spinning isn't
# varied here - see onload-tuning matrix below for that}.
#
# Adjust interface names, cores and NUMA nodes to your hosts. Client and
# server cores are per-host (the roles run on different machines).

matrices:
  - id_template: "bm-{network_path}-pp"
    base:
      description: Bare metal ping-pong + under-load latency, kernel vs Onload
      platform: baremetal
      network_path: kernel        # overridden by axis
      nic:
        ports:
          - { name: ens1f0, card: x2522-a, pci: "0000:3b:00.0", numa_node: 0 }
      cpu:
        client_cores: [4]
        server_cores: [4]
        irq_cores: [2]
        numa_node: 0
        require_isolated: true
      tools:
        - name: sfnt-pingpong
          params: { protocol: tcp, msg_sizes: [32, 64, 256, 1024], duration_s: 10, spin: true }
        - name: sockperf
          params: { mode: under-load, msg_size: 64, mps: 100000, duration_s: 30 }
        - name: netperf
          params: { msg_size: 64, duration_s: 10 }
        - name: iperf3
          params: { duration_s: 10 }
      repetitions: 5
      tags: [core-comparison]
    axes:
      network_path: [kernel, onload]

  # Onload tuning sweep: spinning vs interrupt-driven.
  - id_template: "bm-onload-{onload.env.EF_INT_DRIVEN}"
    base:
      description: Onload spin vs interrupt-driven
      platform: baremetal
      network_path: onload
      onload:
        profile: latency
        env: { EF_POLL_USEC: "100000", EF_INT_DRIVEN: "0" }
      nic:
        ports:
          - { name: ens1f0, card: x2522-a, numa_node: 0 }
      cpu:
        client_cores: [4]
        server_cores: [4]
        irq_cores: [2]
        require_isolated: true
      tools:
        - name: sockperf
          params: { mode: under-load, msg_size: 64, mps: 100000, duration_s: 30 }
      repetitions: 5
      tags: [onload-tuning]
    axes:
      onload.env.EF_INT_DRIVEN: ["0", "1"]
