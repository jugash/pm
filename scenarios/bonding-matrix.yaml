# Bonding layout comparison: single port vs dual-port-same-card
# (active-backup) vs dual-card (active-backup and LACP).
#
# Ports are name-free: resolved per host at run time by Solarflare vendor id
# (two ports -> two distinct matches, name-sorted). The bond device itself
# (`bond_name`) must exist on the hosts with the matching mode — bonds are
# host configuration, not something the harness creates.
#
# Note: Onload accelerates bonded interfaces with mode-dependent
# constraints; failover behaviour is a separate measurement (see
# docs/methodology.md - failover testing is manual in cut one).

scenarios:
  - id: bond-none-single
    description: Baseline single port, no bond
    platform: baremetal
    network_path: onload
    nic:
      vendor: "0x1924"
      ports:
        - { card: x2522-a, numa_node: 0 }
    cpu: &cpu
      client_cores: [4]
      server_cores: [4]
      irq_cores: [2]
      require_isolated: true
    tools: &tools
      - name: sfnt-pingpong
        params: { msg_sizes: [64, 256], duration_s: 10, spin: true }
      - name: sockperf
        params: { mode: under-load, msg_size: 64, mps: 100000, duration_s: 30 }
    repetitions: 5
    tags: [bonding]

  - id: bond-ab-same-card
    description: Active-backup over two ports of one card
    platform: baremetal
    network_path: onload
    nic:
      vendor: "0x1924"
      bond_mode: active_backup
      bond_name: bond0
      ports:
        - { card: x2522-a, numa_node: 0 }
        - { card: x2522-a, numa_node: 0 }
    cpu: *cpu
    tools: *tools
    repetitions: 5
    tags: [bonding]

  - id: bond-ab-dual-card
    description: Active-backup across two cards (card-level redundancy)
    platform: baremetal
    network_path: onload
    nic:
      vendor: "0x1924"
      bond_mode: active_backup
      bond_name: bond0
      ports:
        # dual-card: pin exact slots so resolution can't pick two ports of
        # the same card (adjust addresses per host pair, `perfbench nics`)
        - { card: x2522-a, pci: "0000:3b:00.0", numa_node: 0 }
        - { card: x2522-b, pci: "0000:5e:00.0", numa_node: 0 }
    cpu: *cpu
    tools: *tools
    repetitions: 5
    tags: [bonding]

  - id: bond-lacp-dual-card
    description: LACP 802.3ad across two cards
    platform: baremetal
    network_path: onload
    nic:
      vendor: "0x1924"
      bond_mode: lacp_8023ad
      bond_name: bond0
      ports:
        - { card: x2522-a, pci: "0000:3b:00.0", numa_node: 0 }
        - { card: x2522-b, pci: "0000:5e:00.0", numa_node: 0 }
    cpu: *cpu
    tools: *tools
    repetitions: 5
    tags: [bonding]
