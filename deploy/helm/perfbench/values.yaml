# PerfBench Helm chart values.

nameOverride: ""
fullnameOverride: ""

exporter:
  image:
    repository: ghcr.io/jugash/perfbench-exporter
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  port: 9109
  replicas: 1
  # Persist ingested run records across restarts (JSONL state file).
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: ""   # empty = cluster default
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: "1", memory: 256Mi }
  nodeSelector: {}
  tolerations: []

service:
  type: ClusterIP
  annotations: {}

serviceMonitor:
  enabled: true
  # Must match the label selector your Alloy / prometheus-operator instance
  # uses to discover ServiceMonitors.
  labels:
    release: monitoring
  interval: 30s
  scrapeTimeout: 10s

# Grafana dashboards shipped as a ConfigMap; picked up by the Grafana sidecar
# (grafana_dashboard: "1") or by Alloy remote-provisioning.
dashboards:
  enabled: true
  label: grafana_dashboard
  labelValue: "1"
  folderAnnotation: ""

# Multus NetworkAttachmentDefinition for the benchmark data path (the
# low-latency Solarflare NIC).
nad:
  enabled: false
  name: sfc-lowlat
  # Delivery model:
  #   host-device (default, PF-IOV): the card is partitioned into multiple PFs
  #     (sfboot pf-count); the host-device CNI moves one PF netdev into the pod
  #     netns. No device-plugin resource needed — leave runner.nicResource
  #     empty and sriov.enabled=false.
  #   sriov: SR-IOV-device-plugin model; ties the NAD to a VF resource (set
  #     sriov.* below and runner.nicResource).
  type: host-device
  # host-device: which host PF to relocate. Use the netdev name, or instead
  # set pciBusID / hwaddr (one of the three). With a partitioned card, point
  # client/server at different PFs (or pin nodes that each expose this name).
  device: ens2f0
  pciBusID: ""
  hwaddr: ""
  # IPAM for the benchmark subnet. Dynamic (default): whereabouts assigns from
  # the range. Static: use {"type": "static"} and set runner.clientIp/serverIp
  # so each pod requests its IP via the Multus annotation.
  ipam: |-
    {
      "type": "whereabouts",
      "range": "192.168.100.0/24"
    }
  vlan: 0   # sriov type only (host-device moves the whole netdev)

# SR-IOV device-plugin objects — ONLY for nad.type=sriov. Disabled by default;
# PF-IOV/host-device does not use these.
sriov:
  enabled: false
  # Name registered by the SR-IOV device plugin; referenced in pod resources.
  resourceName: sfc_vf
  resourcePrefix: amd.com        # e.g. amd.com/sfc_vf (Solarflare/Xilinx)
  # SriovNetworkNodePolicy (requires the sriov-network-operator).
  nodePolicy:
    enabled: true
    nodeSelector:
      feature.node.kubernetes.io/network-sriov.capable: "true"
    numVfs: 8
    nicSelector:
      vendor: "1924"             # Solarflare PCI vendor id
      pfNames: ["ens1f0", "ens2f0"]
    deviceType: netdevice        # VFs as kernel netdevs (required for Onload)
    isRdma: false

# Benchmark pod image (the tools). Pods are created by the runner/harness.
bench:
  image:
    repository: ghcr.io/jugash/perfbench-bench
    tag: "0.1.0"
  hugepages2Mi: 1Gi

# In-cluster benchmark runner Job. Each `helm upgrade --set runner.enabled=true`
# creates a new revision-suffixed Job that runs `perfbench k8s-run`: it
# provisions client/server pods, runs the selected scenarios, pushes results
# to the exporter, and cleans up.
runner:
  enabled: false
  image:
    repository: ghcr.io/jugash/perfbench-runner
    tag: "0.1.0"
    pullPolicy: IfNotPresent
  # Scenario ids to run; empty = all platform:k8s scenarios in the file.
  scenarioIds: []
  clientNode: ""          # pin client pod to a node (recommended)
  serverNode: ""          # pin server pod to a different node
  networks: [sfc-lowlat]
  # Static IPs (CIDR form) on the first network via the Multus annotation.
  # Requires the NAD to use static IPAM (nad.ipam: {"type": "static"}).
  # Leave empty when the NAD has whereabouts/host-local IPAM.
  clientIp: ""            # e.g. 192.168.100.1/24
  serverIp: ""            # e.g. 192.168.100.2/24
  # NIC extended resource to request — ONLY for the SR-IOV model. Empty for
  # PF-IOV/host-device, where Multus moves the PF into the pod (no resource).
  nicResource: ""
  # Device-plugin resources the benchmark pods request. The isolated-cpus
  # plugin injects ISOLATED_CPUS (taskset target); the onload plugin mounts
  # /dev/onload + /dev/onload_epoll, injects the library and sets ONLOAD_LIB
  # (LD_PRELOAD target). Match these to whatever your plugins advertise.
  isolatedCpusResource: perfbench.io/isolated-cpus
  onloadResource: perfbench.io/onload
  skipPreflight: false
  keepPods: false
  ttlSecondsAfterFinished: 86400
  resources:
    requests: { cpu: 100m, memory: 128Mi }
    limits: { cpu: "1", memory: 512Mi }
  # Scenario YAML mounted into the Job (required when enabled). Example:
  # scenarios: |
  #   scenarios:
  #     - id: k8s-onload-net
  #       platform: k8s
  #       ...
  scenarios: ""

rbac:
  create: true

# OpenShift Container Platform integration: SecurityContextConstraints
# granting the benchmark pods their required capabilities (Onload devices come
# from the device plugin, so no hostPath). Requires cluster-admin to install.
openshift:
  enabled: true
