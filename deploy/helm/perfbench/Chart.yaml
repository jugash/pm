apiVersion: v2
name: perfbench
description: >-
  PerfBench: network & CPU latency benchmark harness for low-latency trading
  platforms. Deploys the Prometheus results exporter (Service + ServiceMonitor
  for Grafana Alloy), optional SR-IOV/Multus networking objects for
  kernel-bypass benchmark pods, and Grafana dashboards.
type: application
version: 0.1.0
appVersion: "0.1.0"
keywords:
  - benchmarking
  - latency
  - solarflare
  - onload
  - sriov
maintainers:
  - name: jugash
