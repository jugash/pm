apiVersion: v1
kind: Service
metadata:
  name: {{ include "perfbench.fullname" . }}-exporter
  labels:
    {{- include "perfbench.labels" . | nindent 4 }}
    app.kubernetes.io/component: exporter
  {{- with .Values.service.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "perfbench.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.exporter.port }}
      targetPort: metrics
      protocol: TCP
